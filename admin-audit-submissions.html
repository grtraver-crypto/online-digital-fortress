<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Submissions Admin | Online Digital Fortress</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <style>
    body { padding: 40px 24px; }
    .admin-shell { max-width: 1100px; margin: 0 auto; }
    .admin-card { background: #fff; border: 1px solid #d8d4cb; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px 10px; border-bottom: 1px solid #e8e4db; text-align: left; font-size: 14px; }
    th { font-family: "Inter", Arial, sans-serif; text-transform: uppercase; letter-spacing: 0.08em; color: #7a7a72; }
    .admin-note { margin-top: 16px; color: #4a4a44; font-family: "Inter", Arial, sans-serif; font-size: 14px; }
  </style>
</head>
<body>
  <div class="admin-shell">
    <div class="admin-card">
      <p class="section-eyebrow">Admin view</p>
      <h1 class="section-headline">Audit Submissions</h1>
      <p class="section-subtext">This page reads the local submission log generated by the audit signup form.</p>
      <div id="admin-status" class="admin-note">Loading submissions...</div>
      <table id="submissions-table" style="display:none">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadSubmissions() {
      try {
        const response = await fetch('/data/audit-submissions.json');
        if (!response.ok) throw new Error('No submissions file found');
        const data = await response.json();
        const tbody = document.querySelector('#submissions-table tbody');
        const status = document.getElementById('admin-status');
        const table = document.getElementById('submissions-table');

        if (!Array.isArray(data) || data.length === 0) {
          status.textContent = 'No submissions have been recorded yet.';
          table.style.display = 'none';
          return;
        }

        tbody.innerHTML = '';
        data.slice().reverse().forEach(function (item) {
          const row = document.createElement('tr');
          row.innerHTML = '<td>' + (item.name || '') + '</td><td>' + (item.email || '') + '</td><td>' + (item.submittedAt || '') + '</td>';
          tbody.appendChild(row);
        });

        table.style.display = 'table';
        status.textContent = 'Showing the latest audit submissions.';
      } catch (err) {
        document.getElementById('admin-status').textContent = 'Unable to load submissions yet.';
      }
    }

    loadSubmissions();
  </script>
</body>
</html>
